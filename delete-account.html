<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
  <title>GoFix – Delete Account</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #DC2626;
      --red-light: #FEF2F2;
      --red-border: #FECACA;
      --blue: #2563EB;
      --blue-light: #EFF6FF;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F5F7FA;
      color: var(--gray-900);
    }

    .logo-header { text-align: center; padding: 30px 20px; background: white; border-bottom: 1px solid var(--gray-200); }
    .app-logo { width: 100px; height: auto; }

    .page { max-width: 480px; margin: 0 auto; padding: 20px; }

    .section-label {
      font-size: 14px;
      font-weight: 700;
      margin: 18px 0 8px;
      color: var(--gray-700);
    }

    .input-group { position: relative; width: 100%; }

    select, input {
      width: 100%;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 16px;
      margin-bottom: 5px;
      background: white;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: var(--blue); }

    .btn {
      width: 100%; padding: 16px; border-radius: var(--radius);
      font-size: 16px; font-weight: 700; cursor: pointer; border: none;
      margin-top: 15px; transition: 0.3s;
    }

    .btn-red { background: var(--red); color: white; }
    .btn-red:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--blue);
      color: var(--blue);
      margin-top: 10px;
    }

    /* Success Screen */
    #success-screen { display: none; text-align: center; padding: 60px 20px; }
  </style>
</head>
<body>

<div id="main-screen">
  <div class="logo-header">
    <img src="https://raw.githubusercontent.com/sadiahamid/gofix-policies/main/IMG_8799.PNG" alt="GoFix Logo" class="app-logo">
    <h2 style="margin-top:10px;">Account Deletion</h2>
  </div>

  <div class="page">
    <div class="section-label">Why are you leaving?</div>
    <select id="reason-select" onchange="checkForm()">
      <option value="" disabled selected>Select a reason</option>
      <option value="privacy">Privacy concerns</option>
      <option value="expensive">Too expensive</option>
      <option value="not_needed">No longer need services</option>
      <option value="other">Other</option>
    </select>

    <div class="section-label">Confirm your password</div>
    <div class="input-group">
      <input type="password" id="password-input" placeholder="Enter your password" oninput="checkForm()">
    </div>

    <div class="section-label">Type DELETE to confirm</div>
    <input type="text" id="confirm-input" placeholder="TYPE DELETE HERE" oninput="checkForm()">

    <button class="btn btn-red" id="delete-btn" disabled onclick="submitDeletion()">
      🗑️ Delete Account
    </button>

    <button class="btn btn-outline" onclick="history.back()">
      Cancel, Keep My Account
    </button>
  </div>
</div>

<div id="success-screen">
  <h1 style="color:var(--green); font-size: 60px;">✓</h1>
  <h2>Request Received</h2>
  <p style="color:var(--gray-500); margin-top: 10px;">Your account is scheduled for deletion.</p>
</div>

<script>
  function checkForm() {
    const reason = document.getElementById('reason-select').value;
    const password = document.getElementById('password-input').value.trim();
    const confirmText = document.getElementById('confirm-input').value.trim().toUpperCase();
    const deleteBtn = document.getElementById('delete-btn');

    // Button enable tab hoga jab:
    // 1. Reason select ho
    // 2. Password field khaali na ho
    // 3. Confirm text bilkul "DELETE" ho
    if (reason !== "" && password.length > 0 && confirmText === "DELETE") {
      deleteBtn.disabled = false;
    } else {
      deleteBtn.disabled = true;
    }
  }

  function submitDeletion() {
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
  }
</script>

</body>
</html>
