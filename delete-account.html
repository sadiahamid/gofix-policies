<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoFix – Delete Account</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --red: #DC2626; --blue: #1A3FA3; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
      --gray-500: #6B7280; --gray-800: #1F2937; --radius: 12px;
    }
    body { font-family: 'DM Sans', sans-serif; background: #F5F7FA; color: var(--gray-800); }

    /* ── Header ── */
    .header { background: white; padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--gray-200); }
    .logo-wrap { width: 100px; margin: 0 auto 15px; }
    .logo-wrap img { width: 100%; height: auto; }

    .page { max-width: 480px; margin: 0 auto; padding: 20px 16px 60px; }
    .section-label { font-size: 14px; font-weight: 700; margin-bottom: 8px; margin-top: 20px; color: var(--gray-800); }

    /* ── Input Fields ── */
    input, select {
      width: 100%; padding: 14px; border-radius: var(--radius);
      border: 1.5px solid var(--gray-200); outline: none; font-size: 14px; margin-bottom: 12px;
    }
    input:focus { border-color: var(--blue); }

    /* ── Choice Cards for Reason ── */
    .choice-group { display: flex; flex-direction: column; gap: 8px; }
    .choice-card {
      background: white; border: 1.5px solid var(--gray-200); padding: 12px;
      border-radius: var(--radius); cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 10px;
    }
    .choice-card.selected { border-color: var(--red); background: #FEF2F2; }

    /* ── Buttons ── */
    .btn {
      width: 100%; padding: 15px; border-radius: var(--radius); font-weight: 700;
      border: none; cursor: pointer; transition: 0.2s; margin-top: 10px;
    }
    .btn-red { background: var(--red); color: white; }
    .btn-red:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }
    .btn-back { background: transparent; color: var(--gray-500); border: 1px solid var(--gray-200); }

    #success-screen { display: none; text-align: center; padding: 60px 20px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <img src="https://raw.githubusercontent.com/sadiahamid/gofix-policies/main/IMG_8799.PNG" alt="GoFix">
  </div>
  <h2>Account Deletion</h2>
</div>

<div class="page" id="main-screen">
  
  <div class="section-label">User ID / Email</div>
  <input type="text" id="user-id" placeholder="Enter your registered ID" oninput="checkForm()">

  <div class="section-label">Password</div>
  <input type="password" id="password" placeholder="Enter your password" oninput="checkForm()">

  <div class="section-label">Why are you leaving?</div>
  <div class="choice-group">
    <div class="choice-card" onclick="selectReason(this, 'Privacy')">Privacy concerns</div>
    <div class="choice-card" onclick="selectReason(this, 'No longer needed')">No longer need services</div>
    <div class="choice-card" onclick="selectReason(this, 'Other')">Other</div>
  </div>
  <input type="hidden" id="selected-reason" value="">

  <div class="section-label" style="margin-top:25px;">Type "DELETE" to confirm</div>
  <input type="text" id="confirm-delete" placeholder="DELETE" oninput="checkForm()" style="text-transform:uppercase;">

  <button class="btn btn-red" id="delete-btn" disabled onclick="submitRequest()">Delete My Account</button>
  <button class="btn btn-back" onclick="window.history.back()">Go Back</button>

</div>

<div id="success-screen">
  <h1 style="color:var(--red); font-size: 50px;">✓</h1>
  <h2>Request Submitted</h2>
  <p>Your account will be permanently deleted within 7 days.</p>
  <button class="btn btn-back" style="width: auto; margin-top: 30px;" onclick="location.reload()">Done</button>
</div>

<script>
  let reasonSelected = false;

  function selectReason(element, val) {
    document.querySelectorAll('.choice-card').forEach(c => c.classList.remove('selected'));
    element.classList.add('selected');
    document.getElementById('selected-reason').value = val;
    reasonSelected = true;
    checkForm();
  }

  function checkForm() {
    const userId = document.getElementById('user-id').value.trim();
    const pass = document.getElementById('password').value.trim();
    const confirm = document.getElementById('confirm-delete').value.trim().toUpperCase();
    
    const isReady = userId.length > 3 && pass.length > 5 && reasonSelected && confirm === 'DELETE';
    document.getElementById('delete-btn').disabled = !isReady;
  }

  function submitRequest() {
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
  }
</script>

</body>
</html>
