<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
  <title>GoFix – Delete Account</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* CSS yahan fix kar diya hai */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --red: #DC2626;
      --red-light: #FEF2F2;
      --red-border: #FECACA;
      --blue: #2563EB;
      --blue-light: #EFF6FF;
      --blue-border: #BFDBFE;
      --orange-bg: #FFF7ED;
      --orange-border: #FED7AA;
      --green: #16A34A;
      --gray-200: #E5E7EB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --radius: 12px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F5F7FA;
      color: var(--gray-900);
      line-height: 1.5;
    }

    .logo-header {
      text-align: center;
      padding: 30px 20px;
      background: white;
      border-bottom: 1px solid var(--gray-200);
    }

    .app-logo {
      width: 100px;
      height: auto;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
    }

    .instruction-card {
      background: var(--blue-light);
      border: 1px solid var(--blue-border);
      padding: 16px;
      border-radius: var(--radius);
      margin-bottom: 20px;
    }

    .banner {
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 24px;
      border: 1px solid var(--red-border);
      background: var(--red-light);
      color: #7F1D1D;
    }

    .section-label {
      font-size: 14px;
      font-weight: 700;
      margin: 15px 0 8px;
      color: var(--gray-700);
    }

    select, input {
      width: 100%;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 12px;
      font-size: 16px;
      margin-bottom: 10px;
      background: white;
    }

    .btn {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      margin-top: 10px;
    }

    .btn-red { background: var(--red); color: white; }
    .btn-red:disabled { background: var(--gray-200); color: var(--gray-400); cursor: not-allowed; }

    #success-screen { display: none; text-align: center; padding: 50px 20px; }
    .modal-date-box { background: var(--orange-bg); border: 1px solid var(--orange-border); border-radius: 8px; padding: 12px; margin-top: 15px; color: #92400E; }
  </style>
</head>
<body>

<div id="main-screen">
  <div class="logo-header">
    <img src="https://raw.githubusercontent.com/sadiahamid/gofix-policies/main/IMG_8799.PNG" alt="GoFix Logo" class="app-logo">
    <h2 style="margin-top:10px;">Account Deletion</h2>
  </div>

  <div class="page">
    <div class="instruction-card">
      <h4 style="color:var(--blue); margin-bottom:5px;">📱 Steps:</h4>
      <ol style="padding-left: 20px; font-size: 14px;">
        <li>Open GoFix App</li>
        <li>Go to Sidebar Menu</li>
        <li>Tap Delete Account</li>
      </ol>
    </div>

    <div class="banner">
      <strong>⚠️ Warning:</strong>
      <p style="font-size: 13px;">This action is permanent. Data will be removed in 7 days.</p>
    </div>

    <div class="section-label">Reason</div>
    <select id="reason-select" onchange="checkForm()">
      <option value="" disabled selected>Select a reason</option>
      <option value="privacy">Privacy</option>
      <option value="other">Other</option>
    </select>

    <div class="section-label">Type DELETE</div>
    <input type="text" id="confirm-input" placeholder="DELETE" oninput="checkForm()">

    <button class="btn btn-red" id="delete-btn" disabled onclick="submitDeletion()">Delete My Account</button>
  </div>
</div>

<div id="success-screen">
  <h1 style="color:var(--green); font-size: 50px;">✓</h1>
  <h2>Done!</h2>
  <p>Account scheduled for deletion on:</p>
  <div class="modal-date-box" id="final-date"></div>
</div>

<script>
  function checkForm() {
    const reason = document.getElementById('reason-select').value;
    const confirm = document.getElementById('confirm-input').value.trim().toUpperCase();
    document.getElementById('delete-btn').disabled = !(reason && confirm === 'DELETE');
  }

  function submitDeletion() {
    const d = new Date();
    d.setDate(d.getDate() + 7);
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('success-screen').style.display = 'block';
    document.getElementById('final-date').innerText = d.toDateString();
  }
</script>

</body>
</html>
