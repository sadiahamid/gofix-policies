<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GoFix – Account Deletion</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --gofix-blue: #3B82F6; /* Aapke logo wala blue shade */
      --gray-900:   #111827;
      --radius:     16px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #FFFFFF; /* Pure White Background */
      color: var(--gray-900);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px;
    }

    /* ── Logo Container (Fixing the White Hammer issue) ── */
    .logo-box {
      background: var(--gofix-blue); /* Blue background taake white hammer nazar aaye */
      width: 100px;
      height: 100px;
      border-radius: 22%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
      margin-bottom: 20px;
    }

    .app-logo {
      width: 70px;
      height: auto;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .page-content {
      max-width: 450px;
      width: 90%;
      text-align: center;
    }

    .status-badge {
      background: #F3F4F6;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      color: #6B7280;
      display: inline-block;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>

  <div class="logo-box">
    <img src="IMG_8911.PNG" alt="GoFix Logo" class="app-logo">
  </div>

  <div class="page-content">
    <h1>Account Deletion</h1>
    <div class="status-badge">GoFix – Home Services</div>
    
    <p style="color: #4B5563; line-height: 1.6; font-size: 15px;">
      We are sorry to see you go. Once you submit this request, your account and all associated data will be permanently removed within 7 working days.
    </p>
    </p>
  </div>

</body>
</html>
